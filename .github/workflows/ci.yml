name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11
      - name: Check for vulnerabilities
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          # govulncheck has no native suppression (golang/go#59507).
          # Skip vulns with no fix available — we can't act on them.
          govulncheck ./... 2>&1 | tee /tmp/vulncheck.out || true
          # Parse output: each vuln block has "Fixed in:" line
          # "Fixed in: N/A" = no upstream fix, skip it
          # "Fixed in: v1.2.3" = fixable, fail CI
          if grep -q "Vulnerability #" /tmp/vulncheck.out; then
            fixable=$(awk '/^Vulnerability #/{vuln=$0} /Fixed in:/{if ($NF != "N/A") print vuln}' /tmp/vulncheck.out || true)
            if [ -n "$fixable" ]; then
              echo "::error::Fixable vulnerabilities found — upgrade dependencies:"
              echo "$fixable"
              exit 1
            fi
            echo "Only unfixable upstream vulnerabilities found (no patched versions available) — skipping"
          fi
      - name: Check dependency licenses
        run: |
          go install github.com/google/go-licenses@latest
          go-licenses check ./... --disallowed_types=restricted,reciprocal 2>&1
          # List all licenses for visibility
          go-licenses csv ./... 2>/dev/null | head -30
      - name: Validate goreleaser config
        run: |
          curl -sSfL https://github.com/goreleaser/goreleaser/releases/download/v2.6.1/goreleaser_Linux_x86_64.tar.gz | tar xz -C /tmp goreleaser
          /tmp/goreleaser check

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Check formatting
        run: |
          bad=$(gofmt -l .)
          if [ -n "$bad" ]; then
            echo "::error::The following files have formatting issues:"
            echo "$bad"
            echo ""
            echo "Tip: Run 'make setup' to install lefthook pre-commit hooks that auto-fix formatting."
            exit 1
          fi
      - name: Vet
        run: go vet ./...
      - name: Tidy check
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum
      - name: Check for silent failure patterns
        run: make check-silent-failures
      - name: Unit tests
        run: go test -short ./... -v -race -coverprofile=coverage.out 2>&1 | tee test-output.log
      - name: Run fuzz tests (quick)
        run: |
          go test ./internal/shell/ -fuzz=FuzzQuote -fuzztime=10s
          go test ./internal/config/ -fuzz=FuzzParseUpdateInterval -fuzztime=10s
          go test ./internal/invocation/ -fuzz=FuzzParseName -fuzztime=10s
          go test ./internal/parse/ -fuzz=FuzzImageDigest -fuzztime=10s
      - name: Upload coverage
        uses: actions/upload-artifact@v6
        with:
          name: coverage
          path: coverage.out
      - name: Check coverage threshold
        run: |
          total=$(go tool cover -func=coverage.out | grep "total:" | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: ${total}%"
          threshold=60
          if [ "$(echo "$total < $threshold" | bc -l)" -eq 1 ]; then
            echo "::error::Coverage ${total}% is below threshold ${threshold}%"
            exit 1
          fi
      - name: Coverage summary
        if: always()
        run: |
          {
            echo "## Unit test coverage"
            echo ""
            echo "Measures lines executed by \`-short\` tests with explicit assertions."
            echo "Integration/journey tests run in the \`e2e\` job — see that job for reach."
            echo ""
            echo "| Package | Coverage |"
            echo "|---------|----------|"
            grep -E "^ok\s+github.com/ai-shim/ai-shim/" test-output.log | \
              awk '{
                pkg=$2
                sub(/^github\.com\/ai-shim\/ai-shim\//, "", pkg)
                for (i=1; i<=NF; i++) if ($i == "coverage:") { cov=$(i+1); break }
                if (cov == "") cov="—"
                printf "| %s | %s |\n", pkg, cov
              }' | sort
            total=$(go tool cover -func=coverage.out | grep "total:" | awk '{print $3}')
            passed=$(grep -c "^--- PASS:" test-output.log || echo 0)
            skipped=$(grep -c "^--- SKIP:" test-output.log || echo 0)
            echo ""
            echo "**Aggregate line coverage:** ${total}"
            echo ""
            echo "**Tests:** ${passed} passed, ${skipped} skipped"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Build native binary
        run: |
          VERSION="dev-$(git rev-parse --short HEAD)"
          go build -trimpath -ldflags "-s -w -X main.version=$VERSION" -o ai-shim ./cmd/ai-shim
      - name: Smoke test - version
        run: ./ai-shim version
      - name: Smoke test - help
        run: ./ai-shim help
      - name: Smoke test - init
        run: |
          export HOME=$(mktemp -d)
          ./ai-shim init
          test -f "$HOME/.ai-shim/config/default.yaml"
      - name: Smoke test - manage agents
        run: ./ai-shim manage agents
      - name: Smoke test - manage doctor
        run: ./ai-shim manage doctor || true
      - name: Smoke test - dry-run
        run: |
          export HOME=$(mktemp -d)
          ./ai-shim init
          ./ai-shim manage dry-run claude-code default
      - name: Smoke test - completion
        run: ./ai-shim completion bash > /dev/null

  test-macos:
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Unit + integration tests (no Docker)
        run: go test -short ./... -v -race -count=1
      - name: Build native binary
        run: |
          VERSION="dev-$(git rev-parse --short HEAD)"
          go build -trimpath -ldflags "-s -w -X main.version=$VERSION" -o ai-shim ./cmd/ai-shim
      - name: Smoke test - version
        run: ./ai-shim version
      - name: Smoke test - help
        run: ./ai-shim help
      - name: Smoke test - init
        run: |
          export HOME=$(mktemp -d)
          ./ai-shim init
          test -f "$HOME/.ai-shim/config/default.yaml"
      - name: Smoke test - manage agents
        run: ./ai-shim manage agents
      - name: Smoke test - manage doctor
        run: ./ai-shim manage doctor || true
      - name: Smoke test - dry-run
        run: |
          export HOME=$(mktemp -d)
          ./ai-shim init
          ./ai-shim manage dry-run claude-code default
      - name: Smoke test - completion
        run: ./ai-shim completion bash > /dev/null

  e2e-macos:
    needs: [test-macos]
    # ARM macOS runners (macos-latest = M-series) lack nested virtualization,
    # so Docker/Colima cannot start a Linux VM. Intel runners work.
    # When GitHub enables nested virt on M3+ runners, switch back to macos-latest.
    # Colima startup is slow on free Intel runners — bumped to 45min job timeout.
    runs-on: macos-15-intel
    timeout-minutes: 45
    env:
      AI_SHIM_CI: "1"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Pre-cache Go dependencies
        # Download modules and build test binaries in the background so they're
        # ready by the time Colima finishes starting. On a cold cache this saves
        # ~12 minutes of serial download time.
        run: |
          go mod download &
          MOD_PID=$!
          echo "Started go mod download in background (PID $MOD_PID)"
          # Don't wait — let it run while Colima installs
          echo "MOD_PID=$MOD_PID" >> "$GITHUB_ENV"
      - name: Install Docker via Colima
        run: |
          brew install docker colima
          # VZ is the default backend on macOS 13+ and works on Intel runners.
          # Retry up to 3 times if VM fails to start.
          for attempt in 1 2 3; do
            echo "Starting Colima (attempt $attempt/3)..."
            colima start --cpu 2 --memory 4 --disk 20 && break
            echo "Colima start failed, retrying..."
            colima delete -f 2>/dev/null || true
            sleep 5
          done
          # Colima uses its own socket path, not /var/run/docker.sock
          export DOCKER_HOST="unix://$HOME/.colima/default/docker.sock"
          echo "DOCKER_HOST=$DOCKER_HOST" >> "$GITHUB_ENV"
          # Wait for Docker daemon to be fully ready
          for i in $(seq 1 60); do
            if docker info 2>/dev/null | grep -q "Server Version"; then
              echo "Docker is ready"
              break
            fi
            echo "Waiting for Docker daemon... ($i/60)"
            sleep 3
          done
          docker info
      - name: Wait for Go module download to finish
        run: |
          if [ -n "${MOD_PID:-}" ] && kill -0 "$MOD_PID" 2>/dev/null; then
            echo "Waiting for background go mod download (PID $MOD_PID)..."
            wait "$MOD_PID" || go mod download
          fi
          # Pre-build test binaries so the test step doesn't spend time compiling
          go test -count=0 ./test/... ./internal/container/ ./internal/dind/ ./internal/docker/
      - name: E2E and integration tests
        run: go test ./test/... ./internal/container/ ./internal/dind/ ./internal/docker/ -v -count=1 -timeout 1500s
      - name: Stop Colima
        if: always()
        run: colima stop

  e2e:
    needs: [test]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      AI_SHIM_CI: "1"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: E2E and integration tests
        run: |
          AI_SHIM_CI=1 go test ./test/... ./internal/container/ ./internal/dind/ ./internal/network/ ./internal/docker/ \
            -v -count=1 -timeout 600s -race 2>&1 | tee e2e-output.log
          exit ${PIPESTATUS[0]}
        timeout-minutes: 15
      - name: E2E summary
        if: always()
        run: |
          {
            echo "## Integration & journey test reach"
            echo ""
            echo "Journey tests exercise the full stack with real Docker. They verify"
            echo "end-to-end behavior (agent launches, installs, runs), not unit correctness."
            echo "Line coverage numbers are deliberately not merged with unit tests — see"
            echo "the test job for verified coverage."
            echo ""
            journeys=$(grep -c "^--- PASS: TestJourney_" e2e-output.log || echo 0)
            total_pass=$(grep -c "^--- PASS:" e2e-output.log || echo 0)
            total_fail=$(grep -c "^--- FAIL:" e2e-output.log || echo 0)
            total_skip=$(grep -c "^--- SKIP:" e2e-output.log || echo 0)
            echo "| Metric | Count |"
            echo "|--------|-------|"
            echo "| Journey tests (TestJourney_*) | ${journeys} |"
            echo "| Total passed | ${total_pass} |"
            echo "| Total failed | ${total_fail} |"
            echo "| Total skipped | ${total_skip} |"
            echo ""
            echo "### Per-package runtime"
            echo ""
            echo "| Package | Duration |"
            echo "|---------|----------|"
            grep -E "^ok\s+github.com/ai-shim/ai-shim/" e2e-output.log | \
              awk '{
                pkg=$2; sub(/^github\.com\/ai-shim\/ai-shim\//, "", pkg)
                printf "| %s | %s |\n", pkg, $3
              }' | sort
          } >> "$GITHUB_STEP_SUMMARY"

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION="dev-$(git rev-parse --short HEAD)"
          go build -trimpath -ldflags "-s -w -X main.version=$VERSION" -o ai-shim-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/ai-shim
      - name: Verify binary exists
        run: test -f ai-shim-${{ matrix.goos }}-${{ matrix.goarch }} || (echo "Binary not found!" && exit 1)
      - name: Check binary size and hash
        id: binary_info
        run: |
          binary="ai-shim-${{ matrix.goos }}-${{ matrix.goarch }}"
          size=$(stat --format=%s "$binary")
          size_mb=$((size / 1048576))
          sha=$(sha256sum "$binary" | awk '{print $1}')
          echo "Binary size: ${size_mb}MB (${size} bytes)"
          echo "SHA256: ${sha}"
          echo "size=${size}" >> "$GITHUB_OUTPUT"
          echo "size_mb=${size_mb}" >> "$GITHUB_OUTPUT"
          echo "sha=${sha}" >> "$GITHUB_OUTPUT"
          max_mb=20
          if [ "$size_mb" -gt "$max_mb" ]; then
            echo "::error::Binary size ${size_mb}MB exceeds ${max_mb}MB limit"
            exit 1
          fi
      - name: Build summary
        if: always()
        run: |
          {
            echo "## Build: ${{ matrix.goos }}/${{ matrix.goarch }}"
            echo ""
            echo "| Property | Value |"
            echo "|----------|-------|"
            echo "| Binary | \`ai-shim-${{ matrix.goos }}-${{ matrix.goarch }}\` |"
            echo "| Size | ${{ steps.binary_info.outputs.size_mb }}MB (${{ steps.binary_info.outputs.size }} bytes) |"
            echo "| SHA256 | \`${{ steps.binary_info.outputs.sha }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload binary
        uses: actions/upload-artifact@v6
        with:
          name: ai-shim-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ai-shim-${{ matrix.goos }}-${{ matrix.goarch }}
