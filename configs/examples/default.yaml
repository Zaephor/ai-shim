# ai-shim default configuration
#
# This file is loaded as tier 1 (lowest precedence) for every invocation.
# Place it at: ~/.ai-shim/config/default.yaml
#
# All fields are optional. Missing fields use built-in defaults.

# Template variables -- available in {{ .varname }} expressions below.
# These are NOT injected into the container environment.
# variables:
#   llm_host: "my-llm-host:8080"

# Environment variables injected into the container.
# Supports Go text/template syntax using variables defined above.
# env:
#   LLM_ENDPOINT: "https://{{ .llm_host }}/v1"

# Container image. Default: ghcr.io/catthehacker/ubuntu:act-24.04
# Supports tag references or @sha256: digest pinning for reproducibility.
# image: "ghcr.io/catthehacker/ubuntu:act-24.04"
# image: "ghcr.io/catthehacker/ubuntu@sha256:abcdef1234567890..."

# Container hostname. Default: ai-shim
# hostname: "ai-shim"

# Pin agent version. Empty string means latest.
# version: ""

# How often to re-install the agent to check for updates.
# Options: "always" (every launch), "never", or a duration ("1d", "7d", "24h")
# Default: "1d" (daily). Ignored when version is pinned.
# update_interval: "1d"

# Default arguments passed to the agent CLI before any passthrough args.
# args:
#   - "--no-telemetry"

# Additional bind-mount volumes (host:container format).
# Automatic mounts for storage, workspace, and home are always included.
# volumes:
#   - "/host/path:/container/path"

# Port mappings (host:container format).
# ports:
#   - "8080:8080"

# Apt packages to install in the container at startup.
# packages:
#   - tmux
#   - git

# Enable Docker-in-Docker sidecar. Default: false
# dind: false

# Enable GPU passthrough for DIND sidecar. Default: false
# dind_gpu: false

# Enable GPU passthrough for agent container. Default: false
# gpu: false

# Network scope for container isolation.
# Options: global, profile, workspace, profile-workspace, isolated (default)
# network_scope: isolated

# Hostname for the DIND sidecar container. Default: ai-shim-dind
# dind_hostname: ai-shim-dind

# Registry mirrors for DIND. Default: mirror.gcr.io
# dind_mirrors:
#   - https://mirror.gcr.io

# Enable pull-through registry cache. Default: false
# dind_cache: false

# Container resource limits (optional, disabled by default)
# resources:
#   memory: "4g"     # e.g. "512m", "2g", "4g"
#   cpus: "2.0"      # decimal CPU count

# DIND container resource limits (optional, disabled by default)
# dind_resources:
#   memory: "2g"
#   cpus: "1.0"

# Git identity for commits made inside the container.
# Also settable via AI_SHIM_GIT_NAME / AI_SHIM_GIT_EMAIL env vars.
# git:
#   name: "Your Name"
#   email: "you@example.com"

# Security profile: controls Linux capability dropping.
# Options: default, strict, none
# security_profile: default

# Directory where `ai-shim manage symlinks create` installs agent symlinks.
# Tilde is expanded to $HOME. Default: ~/.local/bin (a user-writable path
# that is conventionally on $PATH).
#
# If you point this at a directory owned by root (e.g. /usr/local/bin),
# `manage symlinks create` will refuse with a hint to re-run under sudo.
# symlink_dir: ~/.local/bin

# Enable TLS for the DIND Docker socket. Default: false
# dind_tls: false

# MCP servers exposed to the agent (serialized as MCP_SERVERS JSON env var).
# mcp_servers:
#   filesystem:
#     command: npx
#     args: ["@modelcontextprotocol/server-filesystem", "/workspace"]
#     env:
#       NODE_ENV: production

# Cross-agent access: list of agent names whose bins AND data directories
# get mounted into the container.
# allow_agents: []

# Home directory isolation mode (default: true).
# When true, only agent-specific data dirs/files are mounted.
# When false, the entire profile home directory is mounted and all
# installed agents' bins are accessible.
# isolated: true

# Tool provisioning. Install dev tools into the container.
# tools:
#   act:
#     type: tar-extract
#     url: "https://github.com/nektos/act/releases/download/v0.2.74/act_Linux_x86_64.tar.gz"
#     binary: act
#     checksum: "sha256:abc123..."
#   custom-tool:
#     type: custom
#     install: |
#       curl -fsSL https://example.com/install.sh | bash
