# ai-shim profile: Terraform / Infrastructure as Code
#
# Tools for managing infrastructure with Terraform, Terragrunt,
# and related IaC tooling.
# Place at: ~/.ai-shim/config/profiles/terraform.yaml
#
# Usage: claude-code_terraform  (or any agent_terraform)

packages:
  - git
  - unzip

tools:
  # terraform -- infrastructure as code
  terraform:
    type: custom
    install: |
      curl -fsSL "https://releases.hashicorp.com/terraform/1.14.8/terraform_1.14.8_linux_amd64.zip" -o /tmp/terraform.zip
      unzip -o /tmp/terraform.zip -d /usr/local/share/ai-shim/bin/
      chmod +x /usr/local/share/ai-shim/bin/terraform
      rm /tmp/terraform.zip

  # terragrunt -- thin wrapper for Terraform
  terragrunt:
    type: binary-download
    url: "https://github.com/gruntwork-io/terragrunt/releases/download/v0.99.5/terragrunt_linux_amd64"
    binary: terragrunt

  # tflint -- Terraform linter
  tflint:
    type: custom
    install: |
      curl -fsSL "https://github.com/terraform-linters/tflint/releases/download/v0.61.0/tflint_linux_amd64.zip" -o /tmp/tflint.zip
      unzip -o /tmp/tflint.zip -d /usr/local/share/ai-shim/bin/
      chmod +x /usr/local/share/ai-shim/bin/tflint
      rm /tmp/tflint.zip

  # infracost -- cloud cost estimation for Terraform
  infracost:
    type: tar-extract
    url: "https://github.com/infracost/infracost/releases/download/v0.10.43/infracost-linux-amd64.tar.gz"
    binary: infracost

  # tfsec -- security scanner for Terraform
  tfsec:
    type: binary-download
    url: "https://github.com/aquasecurity/tfsec/releases/download/v1.28.14/tfsec-linux-amd64"
    binary: tfsec

  jq:
    type: binary-download
    url: "https://github.com/jqlang/jq/releases/download/jq-1.8.1/jq-linux-amd64"
    binary: jq

  yq:
    type: binary-download
    url: "https://github.com/mikefarah/yq/releases/download/v4.52.5/yq_linux_amd64"
    binary: yq
