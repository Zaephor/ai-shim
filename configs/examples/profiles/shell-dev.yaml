# ai-shim profile: Shell/Bash Development
#
# Rich terminal tooling for shell scripting, system administration,
# and general-purpose development.
# Place at: ~/.ai-shim/config/profiles/shell-dev.yaml
#
# Usage: claude-code_shell-dev  (or any agent_shell-dev)

packages:
  - git
  - tmux
  - curl
  - shellcheck

tools:
  # Modern CLI replacements
  ripgrep:
    type: tar-extract
    url: "https://github.com/BurntSushi/ripgrep/releases/download/15.1.0/ripgrep-15.1.0-x86_64-unknown-linux-musl.tar.gz"
    binary: rg
  fd:
    type: tar-extract
    url: "https://github.com/sharkdp/fd/releases/download/v10.4.2/fd-v10.4.2-x86_64-unknown-linux-gnu.tar.gz"
    binary: fd
  bat:
    type: tar-extract
    url: "https://github.com/sharkdp/bat/releases/download/v0.26.1/bat-v0.26.1-x86_64-unknown-linux-gnu.tar.gz"
    binary: bat
  fzf:
    type: tar-extract
    url: "https://github.com/junegunn/fzf/releases/download/v0.70.0/fzf-0.70.0-linux_amd64.tar.gz"
    binary: fzf
  delta:
    type: tar-extract
    url: "https://github.com/dandavison/delta/releases/download/0.19.1/delta-0.19.1-x86_64-unknown-linux-gnu.tar.gz"
    binary: delta

  # Data processing
  jq:
    type: binary-download
    url: "https://github.com/jqlang/jq/releases/download/jq-1.8.1/jq-linux-amd64"
    binary: jq
  yq:
    type: binary-download
    url: "https://github.com/mikefarah/yq/releases/download/v4.52.5/yq_linux_amd64"
    binary: yq
