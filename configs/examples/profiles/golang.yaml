# ai-shim profile: Go Development
#
# Preconfigures the container for Go projects.
# Place at: ~/.ai-shim/config/profiles/golang.yaml
#
# Usage: claude-code_golang  (or any agent_golang)
#
# Note: Go is pre-installed in the default image (act-24.04).
# This profile adds common Go development tooling.

packages:
  - git
  - make
  - build-essential

env:
  GOPATH: /home/user/go
  CGO_ENABLED: "0"

tools:
  # gvm -- Go version manager (persists installations across container launches)
  # Notes:
  #  - gvm-installer reads GVM_DEST from positional arg $2, NOT env. And
  #    GVM_NAME is hardcoded "gvm" (forced to ".gvm" only when dest=$HOME).
  #    It then aborts if "$GVM_DEST/$GVM_NAME" already exists — our bind
  #    mount is that path and exists empty. So: stage into a temp dir,
  #    then relocate into the bind-mount and rewrite the absolute paths
  #    that the installer bakes into its emitted files.
  #  - Installer also appends its own source line to ~/.bashrc. We pass
  #    GVM_NO_UPDATE_PROFILE=1 to suppress that and add our own idempotent
  #    line instead.
  #  - gvm-installer depends on `hexdump`, which is not in the default
  #    image and cannot be apt-installed without root. We bootstrap a
  #    busybox applet symlink into the shared bin dir; self-contained so
  #    this tool has no dependency on map iteration order.
  #  - gvm is a shell function, not a binary, so we append
  #    `. "$GVM_ROOT/scripts/gvm"` to ~/.bashrc (bind-mounted profile home)
  #    for every interactive agent shell. Idempotent: only if absent.
  gvm:
    type: custom
    data_dir: true
    env_var: GVM_ROOT
    install: |
      # Bootstrap hexdump shim (gvm installer needs it, no root for apt).
      SHIM_BIN="/usr/local/share/ai-shim/bin"
      if ! command -v hexdump >/dev/null 2>&1; then
        if [ ! -x "$SHIM_BIN/busybox" ]; then
          curl -fsSL -o "$SHIM_BIN/busybox" \
            https://busybox.net/downloads/binaries/1.35.0-x86_64-linux-musl/busybox
          chmod +x "$SHIM_BIN/busybox"
        fi
        ln -sf "$SHIM_BIN/busybox" "$SHIM_BIN/hexdump"
      fi
      export PATH="$SHIM_BIN:$PATH"

      if [ ! -f "$GVM_ROOT/scripts/gvm" ]; then
        STAGE="$(mktemp -d)"
        # Installer clones to $STAGE/gvm (GVM_NAME hardcoded "gvm", != $HOME).
        curl -fsSL https://raw.githubusercontent.com/moovweb/gvm/master/binscripts/gvm-installer | \
          GVM_NO_UPDATE_PROFILE=1 bash -s master "$STAGE"
        if [ -d "$STAGE/gvm" ]; then
          cp -a "$STAGE/gvm/." "$GVM_ROOT/"
          # Installer bakes $STAGE/gvm into scripts/gvm and any environment
          # files. Rewrite to our bind-mount path so gvm's internals agree.
          find "$GVM_ROOT" -type f -exec grep -l "$STAGE/gvm" {} + 2>/dev/null \
            | xargs -r sed -i "s|$STAGE/gvm|$GVM_ROOT|g"
        fi
        rm -rf "$STAGE"
      fi
      # Auto-source gvm in future agent shells.
      grep -qxF ". \"\$GVM_ROOT/scripts/gvm\"" "$HOME/.bashrc" 2>/dev/null || \
        printf '\n# ai-shim: load gvm\nexport GVM_ROOT="%s"\n. "$GVM_ROOT/scripts/gvm"\n' "$GVM_ROOT" >> "$HOME/.bashrc"
      # Optional preload: install a default Go version. Remove/comment to skip.
      bash -c ". $GVM_ROOT/scripts/gvm && gvm install go1.24.2 -B && gvm use go1.24.2 --default" || true

  # golangci-lint for linting
  golangci-lint:
    type: custom
    install: |
      curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh | sh -s -- -b /usr/local/bin v2.11.4

  # Data processing
  jq:
    type: binary-download
    url: "https://github.com/jqlang/jq/releases/download/jq-1.8.1/jq-linux-amd64"
    binary: jq
  yq:
    type: binary-download
    url: "https://github.com/mikefarah/yq/releases/download/v4.52.5/yq_linux_amd64"
    binary: yq

  # Better grep/find for code navigation
  ripgrep:
    type: tar-extract
    url: "https://github.com/BurntSushi/ripgrep/releases/download/15.1.0/ripgrep-15.1.0-x86_64-unknown-linux-musl.tar.gz"
    binary: rg
  fd:
    type: tar-extract
    url: "https://github.com/sharkdp/fd/releases/download/v10.4.2/fd-v10.4.2-x86_64-unknown-linux-gnu.tar.gz"
    binary: fd
