# ai-shim profile: Rust Development
#
# Preconfigures the container for Rust projects. Assumes rustup/cargo
# are available in the image or installed by the agent.
# Place at: ~/.ai-shim/config/profiles/rust.yaml
#
# Usage: claude-code_rust  (or any agent_rust)

packages:
  - git
  - build-essential
  - pkg-config
  - libssl-dev

tools:
  # sccache -- shared compilation cache (speeds up rebuilds)
  sccache:
    type: tar-extract
    url: "https://github.com/mozilla/sccache/releases/download/v0.14.0/sccache-v0.14.0-x86_64-unknown-linux-musl.tar.gz"
    binary: sccache

  # cargo-nextest -- faster test runner with better output
  cargo-nextest:
    type: tar-extract
    url: "https://github.com/nextest-rs/nextest/releases/download/cargo-nextest-0.9.132/cargo-nextest-0.9.132-x86_64-unknown-linux-gnu.tar.gz"
    binary: cargo-nextest

  ripgrep:
    type: tar-extract
    url: "https://github.com/BurntSushi/ripgrep/releases/download/15.1.0/ripgrep-15.1.0-x86_64-unknown-linux-musl.tar.gz"
    binary: rg

  fd:
    type: tar-extract
    url: "https://github.com/sharkdp/fd/releases/download/v10.4.2/fd-v10.4.2-x86_64-unknown-linux-gnu.tar.gz"
    binary: fd
