# ai-shim profile: Java / JVM Development
#
# JDK management via SDKMAN, Gradle, and Maven for Java,
# Kotlin, Scala, and Clojure projects.
# Place at: ~/.ai-shim/config/profiles/jvm.yaml
#
# Usage: claude-code_jvm  (or any agent_jvm)

packages:
  - git
  - curl
  - unzip
  - zip

tools:
  # sdkman -- JDK and JVM tool version manager (installs Java, Gradle, Maven)
  # sdkman exposes `sdk` as a shell function, not a binary. The install
  # script runs in a throwaway subshell, so we append a source line to
  # ~/.bashrc (bind-mounted profile home) so every interactive agent shell
  # picks up `sdk` automatically. Idempotent: appends only if absent.
  sdkman:
    type: custom
    data_dir: true
    env_var: SDKMAN_DIR
    install: |
      if [ ! -f "$SDKMAN_DIR/bin/sdkman-init.sh" ]; then
        curl -s "https://get.sdkman.io" | SDKMAN_DIR="$SDKMAN_DIR" bash
      fi
      # Auto-source sdkman in future agent shells.
      grep -qxF ". \"\$SDKMAN_DIR/bin/sdkman-init.sh\"" "$HOME/.bashrc" 2>/dev/null || \
        printf '\n# ai-shim: load sdkman\nexport SDKMAN_DIR="%s"\n. "$SDKMAN_DIR/bin/sdkman-init.sh"\n' "$SDKMAN_DIR" >> "$HOME/.bashrc"
      # Optional preload: install default JDK/Gradle/Maven. Remove/comment to skip.
      bash -c ". $SDKMAN_DIR/bin/sdkman-init.sh && sdk install java && sdk install gradle && sdk install maven" || true

  jq:
    type: binary-download
    url: "https://github.com/jqlang/jq/releases/download/jq-1.8.1/jq-linux-amd64"
    binary: jq

  yq:
    type: binary-download
    url: "https://github.com/mikefarah/yq/releases/download/v4.52.5/yq_linux_amd64"
    binary: yq
