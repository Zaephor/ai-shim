# ai-shim profile: Systems / Benchmarking / Task Running
#
# Modern CLI tools for task automation, benchmarking, code stats,
# and file watching. Useful for any systems-oriented development.
# Place at: ~/.ai-shim/config/profiles/systems.yaml
#
# Usage: claude-code_systems  (or any agent_systems)

packages:
  - git
  - make
  - build-essential

tools:
  # just -- modern task runner (Make alternative, simpler syntax)
  just:
    type: tar-extract
    url: "https://github.com/casey/just/releases/download/1.48.1/just-1.48.1-x86_64-unknown-linux-musl.tar.gz"
    binary: just

  # hyperfine -- command benchmarking tool
  hyperfine:
    type: tar-extract
    url: "https://github.com/sharkdp/hyperfine/releases/download/v1.20.0/hyperfine-v1.20.0-x86_64-unknown-linux-gnu.tar.gz"
    binary: hyperfine

  # tokei -- fast code statistics (lines of code, languages)
  tokei:
    type: tar-extract
    url: "https://github.com/XAMPPRocky/tokei/releases/download/v14.0.0/tokei-x86_64-unknown-linux-gnu.tar.gz"
    binary: tokei

  # xh -- fast HTTP client (HTTPie-compatible, Rust binary)
  xh:
    type: tar-extract
    url: "https://github.com/ducaale/xh/releases/download/v0.25.3/xh-v0.25.3-x86_64-unknown-linux-musl.tar.gz"
    binary: xh

  # trippy -- network tracing TUI (traceroute + ping)
  trippy:
    type: tar-extract
    url: "https://github.com/fujiapple852/trippy/releases/download/0.13.0/trippy-0.13.0-x86_64-unknown-linux-gnu.tar.gz"
    binary: trippy

  ripgrep:
    type: tar-extract
    url: "https://github.com/BurntSushi/ripgrep/releases/download/15.1.0/ripgrep-15.1.0-x86_64-unknown-linux-musl.tar.gz"
    binary: rg

  fd:
    type: tar-extract
    url: "https://github.com/sharkdp/fd/releases/download/v10.4.2/fd-v10.4.2-x86_64-unknown-linux-gnu.tar.gz"
    binary: fd
