# ai-shim profile: Security Scanning & SBOM
#
# Tools for vulnerability scanning, secret detection, and
# software bill of materials generation.
# Place at: ~/.ai-shim/config/profiles/security.yaml
#
# Usage: claude-code_security  (or any agent_security)

packages:
  - git

# DIND for container image scanning.
dind: true

tools:
  # trivy -- comprehensive vulnerability scanner (images, filesystems, repos)
  trivy:
    type: tar-extract
    url: "https://github.com/aquasecurity/trivy/releases/download/v0.69.3/trivy_0.69.3_Linux-64bit.tar.gz"
    binary: trivy

  # grype -- vulnerability scanner by Anchore
  grype:
    type: tar-extract
    url: "https://github.com/anchore/grype/releases/download/v0.110.0/grype_0.110.0_linux_amd64.tar.gz"
    binary: grype

  # syft -- SBOM generator by Anchore
  syft:
    type: tar-extract
    url: "https://github.com/anchore/syft/releases/download/v1.42.3/syft_1.42.3_linux_amd64.tar.gz"
    binary: syft

  # gitleaks -- detect secrets in git history
  gitleaks:
    type: tar-extract
    url: "https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz"
    binary: gitleaks

  # cosign -- container image signing and verification
  cosign:
    type: binary-download
    url: "https://github.com/sigstore/cosign/releases/download/v3.0.5/cosign-linux-amd64"
    binary: cosign

  jq:
    type: binary-download
    url: "https://github.com/jqlang/jq/releases/download/jq-1.8.1/jq-linux-amd64"
    binary: jq
