# ai-shim profile: Machine Learning / MLOps
#
# Experiment tracking, data versioning, model serving,
# and HuggingFace hub access.
# Place at: ~/.ai-shim/config/profiles/mlops.yaml
#
# Usage: claude-code_mlops  (or any agent_mlops)

packages:
  - git
  - python3
  - python3-venv
  - build-essential

# ML workflows benefit from more resources.
resources:
  memory: "8g"
  cpus: "4.0"

# Forward MLflow/model serving ports.
ports:
  - "5000:5000"
  - "8080:8080"

tools:
  # mlflow -- experiment tracking and model registry
  mlflow:
    type: custom
    install: |
      if ! command -v uv >/dev/null 2>&1; then
        curl -LsSf https://astral.sh/uv/install.sh | sh
        export PATH="$HOME/.local/bin:$PATH"
      fi
      uv tool install mlflow

  # dvc -- data version control (Git for data)
  dvc:
    type: custom
    install: |
      if ! command -v uv >/dev/null 2>&1; then
        curl -LsSf https://astral.sh/uv/install.sh | sh
        export PATH="$HOME/.local/bin:$PATH"
      fi
      uv tool install dvc

  # huggingface-cli -- download models and datasets from HuggingFace
  huggingface:
    type: custom
    install: |
      if ! command -v uv >/dev/null 2>&1; then
        curl -LsSf https://astral.sh/uv/install.sh | sh
        export PATH="$HOME/.local/bin:$PATH"
      fi
      uv tool install huggingface-hub

  # ruff for Python ML scripts
  ruff:
    type: tar-extract
    url: "https://github.com/astral-sh/ruff/releases/download/0.15.8/ruff-x86_64-unknown-linux-gnu.tar.gz"
    binary: ruff

  jq:
    type: binary-download
    url: "https://github.com/jqlang/jq/releases/download/jq-1.8.1/jq-linux-amd64"
    binary: jq
