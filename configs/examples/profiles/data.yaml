# ai-shim profile: Database & Data Engineering
#
# Tools for working with databases, data pipelines, and analytics.
# Place at: ~/.ai-shim/config/profiles/data.yaml
#
# Usage: claude-code_data  (or any agent_data)

packages:
  - git
  - unzip
  - sqlite3

# Forward common database ports.
ports:
  - "5432:5432"
  - "3306:3306"
  - "6379:6379"
  - "27017:27017"

tools:
  # duckdb -- fast OLAP database and CLI for analytics
  duckdb:
    type: custom
    install: |
      curl -fsSL "https://github.com/duckdb/duckdb/releases/download/v1.5.1/duckdb_cli-linux-amd64.zip" -o /tmp/duckdb.zip
      unzip -o /tmp/duckdb.zip -d /usr/local/share/ai-shim/bin/
      chmod +x /usr/local/share/ai-shim/bin/duckdb
      rm /tmp/duckdb.zip

  jq:
    type: binary-download
    url: "https://github.com/jqlang/jq/releases/download/jq-1.8.1/jq-linux-amd64"
    binary: jq

  yq:
    type: binary-download
    url: "https://github.com/mikefarah/yq/releases/download/v4.52.5/yq_linux_amd64"
    binary: yq

  # ruff for Python-based data scripts
  ruff:
    type: tar-extract
    url: "https://github.com/astral-sh/ruff/releases/download/0.15.8/ruff-x86_64-unknown-linux-gnu.tar.gz"
    binary: ruff
