# ai-shim profile: AI / LLM Development
#
# Tools for working with language models, building AI applications,
# and testing prompts. Includes Ollama for local model inference.
# Place at: ~/.ai-shim/config/profiles/ai-dev.yaml
#
# Usage: claude-code_ai-dev  (or any agent_ai-dev)
#
# Note: Ollama requires significant resources for model inference.
# GPU passthrough recommended if available.

packages:
  - git
  - curl
  - python3
  - python3-venv

# Enable GPU if available for local model inference.
# gpu: true

# Resource limits -- LLM inference is memory-hungry.
resources:
  memory: "16g"
  cpus: "4.0"

# Forward common API ports.
ports:
  - "8080:8080"
  - "11434:11434"

tools:
  # ollama -- local LLM runtime (llama, mistral, gemma, etc.)
  ollama:
    type: custom
    install: |
      curl -fsSL https://ollama.com/install.sh | sh

  # aichat -- CLI chat with multiple LLM providers
  aichat:
    type: tar-extract
    url: "https://github.com/sigoden/aichat/releases/download/v0.30.0/aichat-v0.30.0-x86_64-unknown-linux-musl.tar.gz"
    binary: aichat

  # ruff for Python AI/ML scripts
  ruff:
    type: tar-extract
    url: "https://github.com/astral-sh/ruff/releases/download/0.15.8/ruff-x86_64-unknown-linux-gnu.tar.gz"
    binary: ruff

  # uv for fast Python dependency management
  uv:
    type: custom
    install: |
      if ! command -v uv >/dev/null 2>&1; then
        curl -LsSf https://astral.sh/uv/install.sh | sh
        export PATH="$HOME/.local/bin:$PATH"
      fi

  # llm -- CLI for interacting with LLM APIs (pip package)
  llm:
    type: custom
    install: |
      if ! command -v uv >/dev/null 2>&1; then
        curl -LsSf https://astral.sh/uv/install.sh | sh
        export PATH="$HOME/.local/bin:$PATH"
      fi
      uv tool install llm

  jq:
    type: binary-download
    url: "https://github.com/jqlang/jq/releases/download/jq-1.8.1/jq-linux-amd64"
    binary: jq
