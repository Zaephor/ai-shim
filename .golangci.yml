run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - gosimple
    - typecheck

linters-settings:
  errcheck:
    check-type-assertions: true

issues:
  exclude-rules:
    # Allow unchecked errors in test files
    - path: _test\.go
      linters:
        - errcheck
    # Allow fmt.Fprintf to stderr (logging pattern)
    - linters:
        - errcheck
      text: "fmt.Fprint"
