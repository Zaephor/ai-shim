version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
  settings:
    errcheck:
      check-type-assertions: true
  exclusions:
    rules:
      # Allow unchecked errors in test files
      - path: _test\.go
        linters:
          - errcheck
      # Allow fmt.Fprintf to stderr (logging pattern)
      - linters:
          - errcheck
        text: "fmt.Fprint"
